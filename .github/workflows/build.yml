name: Build ASD Firewall APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:        # Allows manual trigger from the Actions tab

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 (required for AGP 8.x) ────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Set up Android SDK (pre-installed on ubuntu-latest) ──
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Make Gradle wrapper executable ───────────────────────
      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      # ── 6. Cache Gradle dependencies ────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/*.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 6. Build the debug APK ───────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      # ── 8. Find and display APK info ─────────────────────────────
      - name: List APK output
        run: |
          find . -name "*.apk" -not -path "*/intermediates/*"
          echo "APK build complete!"

      # ── 9. Upload APK as a downloadable artifact ─────────────────
      - name: Upload ASD Firewall APK
        uses: actions/upload-artifact@v4
        with:
          name: ASD-Firewall-APK
          path: app/build/outputs/apk/debug/ASD-Firewall-v*.apk
          retention-days: 30   # Keep for 30 days
          if-no-files-found: error

      # ── 10. Show summary ──────────────────────────────────────────
      - name: Build Summary
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "## ✅ ASD Firewall APK Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **APK Name** | $(basename $APK) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Type** | Debug |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the APK from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
