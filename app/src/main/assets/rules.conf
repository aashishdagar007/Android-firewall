# Default firewall rules for AEGIS XII Android
# Format: ACTION  PROTO  SRC_IP  DST_IP  DST_PORT  "Description"
# Use * for wildcard.

# ── Essential Allow Rules ────────────────────────────────────────
ALLOW  TCP   *  *  443  "HTTPS traffic"
ALLOW  TCP   *  *  80   "HTTP traffic"
ALLOW  UDP   *  *  53   "DNS queries"
ALLOW  UDP   *  *  443  "QUIC/HTTP3"
ALLOW  ICMP  *  *  *    "ICMP ping"
ALLOW  TCP   *  *  993  "IMAP SSL"
ALLOW  TCP   *  *  587  "SMTP submission"
ALLOW  TCP   *  *  5228 "Google Push (GCM/FCM)"

# ── Security Block Rules ─────────────────────────────────────────
BLOCK  TCP   *  *  23   "Block Telnet"
BLOCK  TCP   *  *  135  "Block RPC"
BLOCK  TCP   *  *  139  "Block NetBIOS"
BLOCK  TCP   *  *  445  "Block SMB"
BLOCK  UDP   *  *  137  "Block NetBIOS-NS"
BLOCK  UDP   *  *  138  "Block NetBIOS-DGM"
